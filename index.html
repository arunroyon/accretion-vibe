<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccretionVibe • Herbig Ae/Be Disk Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; }
        canvas { border: 3px solid #67e8f9; box-shadow: 0 0 40px #22d3ee; image-rendering: crisp-edges; }
    </style>
</head>
<body class="flex h-screen text-white overflow-hidden">
    <!-- Canvas side -->
    <div class="flex-1 flex items-center justify-center p-8 bg-black">
        <canvas id="canvas" width="600" height="600" class="rounded-3xl"></canvas>
    </div>

    <!-- Control panel -->
    <div class="w-80 bg-zinc-950 border-l border-cyan-400 p-8 flex flex-col">
        <div class="mb-8">
            <h1 class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-yellow-300">ACCRETION<span class="text-cyan-400">VIBE</span></h1>
            <p class="text-xs uppercase tracking-widest text-cyan-400 mt-1">Herbig Ae/Be Star Disk</p>
        </div>

        <div class="space-y-8 flex-1">
            <div>
                <label class="block text-xs uppercase mb-2 text-cyan-300">Rotation Speed</label>
                <input type="range" id="speed" min="0.1" max="5" step="0.1" value="1.5" class="w-full accent-cyan-400">
                <div id="speedVal" class="text-right text-sm font-mono">1.5</div>
            </div>
            <div>
                <label class="block text-xs uppercase mb-2 text-cyan-300">Accretion Rate (inward)</label>
                <input type="range" id="inward" min="0" max="3" step="0.1" value="0.8" class="w-full accent-cyan-400">
                <div id="inwardVal" class="text-right text-sm font-mono">0.8</div>
            </div>
            <div>
                <label class="block text-xs uppercase mb-2 text-cyan-300">Particle Count</label>
                <input type="range" id="count" min="100" max="1200" step="50" value="600" class="w-full accent-cyan-400">
                <div id="countVal" class="text-right text-sm font-mono">600</div>
            </div>
            <div>
                <label class="block text-xs uppercase mb-2 text-cyan-300">Disk Temperature (K)</label>
                <input type="range" id="temp" min="6000" max="14000" step="500" value="9500" class="w-full accent-cyan-400">
                <div id="tempVal" class="text-right text-sm font-mono">9500 K</div>
            </div>
        </div>

        <button id="factBtn" 
                class="mt-8 w-full bg-gradient-to-r from-cyan-400 to-yellow-300 text-black font-bold py-4 rounded-2xl hover:scale-105 transition text-sm tracking-widest">
            NEW RANDOM HERBIG FACT
        </button>

        <div id="fact" class="mt-6 text-xs leading-relaxed bg-zinc-900/80 p-5 rounded-2xl border border-cyan-900 min-h-[120px]">
            Click for a fact from your research world...
        </div>

        <div class="mt-auto text-[10px] opacity-40 text-center pt-8">
            1-hour vibe project • for the Herbig Ae/Be king
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let rotSpeed = 1.5;
        let accRate = 0.8;
        let temp = 9500;

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.radius = Math.random() * 240 + 40;
                this.angle = Math.random() * Math.PI * 2;
                this.size = Math.random() * 2.5 + 1;
                this.hue = 190 + Math.random() * 40;
            }
            update() {
                this.angle += 0.015 * rotSpeed;
                this.radius -= 0.35 * accRate;
                if (this.radius < 22) this.reset();
            }
            draw() {
                const x = 300 + Math.cos(this.angle) * this.radius;
                const y = 300 + Math.sin(this.angle) * this.radius * 0.35; // flattened disk
                ctx.save();
                ctx.shadowBlur = 18;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 85%)`;
                ctx.fillStyle = `hsl(${this.hue}, 90%, 75%)`;
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function initParticles(count) {
            particles = [];
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }

        function drawStar() {
            // outer glow
            const grad = ctx.createRadialGradient(300, 300, 15, 300, 300, 95);
            grad.addColorStop(0, '#fef08c');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(300, 300, 95, 0, Math.PI * 2); ctx.fill();
            
            // core
            ctx.fillStyle = '#facc15';
            ctx.beginPath(); ctx.arc(300, 300, 28, 0, Math.PI * 2); ctx.fill();
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.12)'; // nice trail
            ctx.fillRect(0, 0, 600, 600);
            
            drawStar();
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            requestAnimationFrame(animate);
        }

        // Sliders
        document.getElementById('speed').addEventListener('input', e => {
            rotSpeed = +e.target.value;
            document.getElementById('speedVal').textContent = rotSpeed.toFixed(1);
        });
        document.getElementById('inward').addEventListener('input', e => {
            accRate = +e.target.value;
            document.getElementById('inwardVal').textContent = accRate.toFixed(1);
        });
        document.getElementById('count').addEventListener('input', e => {
            const newCount = +e.target.value;
            document.getElementById('countVal').textContent = newCount;
            initParticles(newCount);
        });
        document.getElementById('temp').addEventListener('input', e => {
            temp = +e.target.value;
            document.getElementById('tempVal').textContent = temp + ' K';
        });

        // Facts (straight from your Herbig world)
        const facts = [
            "Herbig Ae/Be stars (2–8 M☉) are the transitional mass range between T Tauri and massive stars — exactly what your proposal is investigating!",
            "Accretion can switch between magnetospheric and boundary-layer modes. Your high-res spectroscopy + interferometry will map that transition.",
            "Brγ emission at 2.166 μm is the smoking gun for active accretion — visible in near-IR interferometry.",
            "These young stars show huge variability from disk instabilities and accretion bursts.",
            "Herbig Ae/Be disks are the birthplaces of planets — your work is literally watching star + planet formation in real time."
        ];

        document.getElementById('factBtn').addEventListener('click', () => {
            const factEl = document.getElementById('fact');
            factEl.textContent = facts[Math.floor(Math.random() * facts.length)];
        });

        // Boot it up
        window.onload = () => {
            initParticles(600);
            animate();
            // initial fact
            document.getElementById('fact').textContent = facts[0];
            
            // tailwind ready
            console.log('%cAccretionVibe loaded — go vibe', 'color:#67e8f9; font-family:monospace');
        };
    </script>
</body>
</html>
